<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Site - Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { margin-top: 50px; }
        .video-container { margin-bottom: 20px; background-color: #000; padding: 20px; border-radius: 8px; }
        video { width: 100%; border-radius: 5px; }
        .video-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Video Viewing Site</h1>
        
        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span id="videoTitle">Video Playback</span>
                <a href="index.html" class="btn btn-secondary btn-sm">Back to List</a>
            </div>
            <div class="card-body">
                <div class="video-container">
                    <video id="videoPlayer" controls autoplay>
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div id="videoName" class="text-center font-weight-bold"></div>
            </div>
        </div>
    </div>

    <script>
        // Get video filename from query param
        const urlParams = new URLSearchParams(window.location.search);
        const videoFile = urlParams.get('video');

        if (videoFile) {
            const videoPlayer = document.getElementById('videoPlayer');
            const videoName = document.getElementById('videoName');
            const videoTitle = document.getElementById('videoTitle');
            
            videoPlayer.src = `/uploads/${videoFile}`;
            videoName.innerText = videoFile;
            videoTitle.innerText = `Playing: ${videoFile}`;
        } else {
            alert('No video selected.');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
